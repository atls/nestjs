name: Checks

on:
  pull_request:
    types:
      - opened
      - edited
      - reopened
      - synchronize
    paths-ignore:
      - '.agents/**'
      - '.codex/context/**'
      - '**/*.md'

jobs:
  check:
    name: Checks
    uses: atls/shared/.github/workflows/checks.yaml@master
    permissions: write-all
    with:
      node-version: '22'
